include:
  - db.yaml
  - admin.yaml

services:
  fsapp:
    image: prawee/strapi:latest
    container_name: Fivestar-app
    environment:
      DATABASE_CLIENT: ${APP_CLIENT}
      DATABASE_HOST: ${APP_HOST}
      DATABASE_PORT: ${APP_DB_PORT}
      DATABASE_NAME: ${APP_NAME}
      DATABASE_USERNAME: ${APP_USER}
      DATABASE_PASSWORD: ${APP_PASSWORD}
    depends_on:
      - fsdb

  proxy:
    image: caddy:latest
    container_name: Fivestar-proxy
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - fsapp
      - fsadmin